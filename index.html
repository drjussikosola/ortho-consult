<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:system-ui,-apple-system,sans-serif}
body{background:#f7f8fa;min-height:100vh}
input,select,textarea{font-family:inherit;font-size:14px;outline:none;color:#1a1a2e}
button{font-family:inherit;cursor:pointer}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:#f1f1f1}::-webkit-scrollbar-thumb{background:#c1c1c1;border-radius:3px}
.viewer-canvas{display:block;cursor:crosshair}
.tool-btn{background:rgba(255,255,255,0.08);color:rgba(255,255,255,0.8);border:1px solid rgba(255,255,255,0.15);padding:6px 12px;border-radius:6px;font-size:12px;cursor:pointer;transition:all 0.15s;white-space:nowrap}
.tool-btn:hover{background:rgba(255,255,255,0.18)}

@media(max-width:600px){.two-col{grid-template-columns:1fr!important}.hide-mobile{display:none!important}.nav-links button{padding:5px 8px!important;font-size:12px!important}}

<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useRef,useCallback,useEffect}=React;
const N="#0a2240",B="#1a6eb5",A="#4db8ff";
const ADMIN={email:"admin@orthoconsult.fi",pw:"Lempainen2026"};
const INJURIES=["Hamstring / Takareisi","Quadriceps / Etureisi","Achilles tendon / Akilles","Adductor / Lähentäjä","Knee / Polvi","Ankle / Nilkka","Other / Muu"];
const INIT_CASES=[
  {id:"C-001",patientEmail:"matias@example.com",name:"Matías Fernández",dob:"1994-03-12",email:"matias@example.com",phone:"+34 600 000 001",injury:"Hamstring / Takareisi",date:"2026-04-22",notes:"Acute proximal hamstring pain after sprint.",files:[],fileObjects:[],status:"New",submitted:"2026-05-07 14:32",report:""},
  {id:"C-002",patientEmail:"aleksi@example.com",name:"Aleksi Korhonen",dob:"1990-07-08",email:"aleksi@example.com",phone:"+358 40 000 0002",injury:"Achilles tendon / Akilles",date:"2026-04-18",notes:"Chronic Achilles tendinopathy.",files:[],fileObjects:[],status:"In review",submitted:"2026-05-06 09:15",report:""},
  {id:"C-003",patientEmail:"sofia@example.com",name:"Sofia Rossi",dob:"1998-11-23",email:"sofia@example.com",phone:"+39 02 000 003",injury:"Quadriceps / Etureisi",date:"2026-04-10",notes:"Complete rectus femoris rupture.",files:[],fileObjects:[],status:"Report sent",submitted:"2026-05-04 17:44",report:"MRI confirms complete proximal rectus femoris tendon rupture with 2.3 cm retraction. Surgical repair recommended within 2 weeks."},
];

  {name:"Matías Fernández",email:"matias@example.com",pw:"Patient2026",dob:"1994-03-12",phone:"+34 600 000 001",lang:"English"},
  {name:"Aleksi Korhonen",email:"aleksi@example.com",pw:"Patient2026",dob:"1990-07-08",phone:"+358 40 000 0002",lang:"Finnish / Suomi"},
  {name:"Sofia Rossi",email:"sofia@example.com",pw:"Patient2026",dob:"1998-11-23",phone:"+39 02 000 003",lang:"Italian / Italiano"},
];

/* ══════════════════════════════════════════
   ADVANCED MEDIA VIEWER
══════════════════════════════════════════ */
function AdvancedViewer({file, onClose}){
  const canvasRef=useRef();
  const overlayRef=useRef();
  const videoRef=useRef();
  const [tool,setTool]=useState("pan"); // pan | line | angle | rect | arrow | text
  const [brightness,setBrightness]=useState(100);
  const [contrast,setContrast]=useState(100);
  const [zoom,setZoom]=useState(1);
  const [pan,setPan]=useState({x:0,y:0});
  const [drawings,setDrawings]=useState([]);
  const [current,setCurrent]=useState(null);
  const [isPanning,setIsPanning]=useState(false);
  const [panStart,setPanStart]=useState({x:0,y:0});
  const [info,setInfo]=useState("");
  const [textInput,setTextInput]=useState({show:false,x:0,y:0,val:""});
  const [measureResult,setMeasureResult]=useState("");
  const imgDataRef=useRef(null);
  const isVideo=file?.type?.startsWith("video/");
  const isDcm=file?.name?.toLowerCase().endsWith(".dcm");

  // Load image/DICOM onto canvas
  useEffect(()=>{
    if(!file||isVideo) return;
    const canvas=canvasRef.current;
    if(!canvas) return;
    const ctx=canvas.getContext("2d");

    if(isDcm){
      const reader=new FileReader();
      reader.onload=e=>{
        const buf=new Uint8Array(e.target.result);
        let pixelOffset=-1;
        for(let i=0;i<buf.length-4;i++){
          if(buf[i]===0x7F&&buf[i+1]===0xE0&&buf[i+2]===0x10&&buf[i+3]===0x00){pixelOffset=i+8;break;}
          if(buf[i]===0xE0&&buf[i+1]===0x7F&&buf[i+2]===0x10&&buf[i+3]===0x00){pixelOffset=i+8;break;}
        }
        let rows=512,cols=512;
        for(let i=0;i<buf.length-8;i++){
          if(buf[i]===0x28&&buf[i+1]===0x00&&buf[i+2]===0x10&&buf[i+3]===0x00) rows=buf[i+6]|(buf[i+7]<<8);
          if(buf[i]===0x28&&buf[i+1]===0x00&&buf[i+2]===0x11&&buf[i+3]===0x00) cols=buf[i+6]|(buf[i+7]<<8);
        }
        rows=Math.min(Math.max(rows,64),1024); cols=Math.min(Math.max(cols,64),1024);
        canvas.width=cols; canvas.height=rows;
        const imgData=ctx.createImageData(cols,rows);
        if(pixelOffset>0&&pixelOffset<buf.length){
          const pixels=buf.slice(pixelOffset);
          const is16=pixels.length>=rows*cols*2;
          let mn=65535,mx=0;
          if(is16){for(let i=0;i<rows*cols;i++){const v=pixels[i*2]|(pixels[i*2+1]<<8);if(v<mn)mn=v;if(v>mx)mx=v;}}
          else{for(let i=0;i<rows*cols;i++){if(pixels[i]<mn)mn=pixels[i];if(pixels[i]>mx)mx=pixels[i];}}
          const rng=mx-mn||1;
          for(let i=0;i<rows*cols;i++){
            const raw=is16?(pixels[i*2]|(pixels[i*2+1]<<8)):pixels[i];
            const v=Math.round(((raw-mn)/rng)*255);
            imgData.data[i*4]=v;imgData.data[i*4+1]=v;imgData.data[i*4+2]=v;imgData.data[i*4+3]=255;
          }
        } else {
          // demo gradient
          for(let y=0;y<rows;y++) for(let x=0;x<cols;x++){
            const i=(y*cols+x)*4;
            const v=Math.round(128+80*Math.sin(x/30)*Math.cos(y/30)+40*Math.sin((x+y)/20));
            imgData.data[i]=v;imgData.data[i+1]=v;imgData.data[i+2]=v;imgData.data[i+3]=255;
          }
        }
        ctx.putImageData(imgData,0,0);
        imgDataRef.current=canvas.toDataURL();
        setInfo(`DICOM · ${cols}×${rows}px · ${(file.size/1024).toFixed(0)} KB`);
      };
      reader.readAsArrayBuffer(file);
    } else {
      const url=URL.createObjectURL(file);
      const img=new Image();
      img.onload=()=>{
        canvas.width=img.width; canvas.height=img.height;
        ctx.drawImage(img,0,0);
        imgDataRef.current=canvas.toDataURL();
        setInfo(`${img.width}×${img.height}px · ${(file.size/1024).toFixed(0)} KB`);
        URL.revokeObjectURL(url);
      };
      img.src=url;
    }
  },[file]);

  // Redraw overlay whenever drawings/zoom/pan/brightness/contrast change
  useEffect(()=>{
    const overlay=overlayRef.current;
    if(!overlay) return;
    const ctx=overlay.getContext("2d");
    const W=overlay.width, H=overlay.height;
    ctx.clearRect(0,0,W,H);
    const drawShape=(d,alpha=1)=>{
      ctx.save();
      ctx.globalAlpha=alpha;
      ctx.strokeStyle=d.color||"#00ff88";
      ctx.fillStyle=d.color||"#00ff88";
      ctx.lineWidth=(d.lw||2)/zoom;
      ctx.font=`${14/zoom}px system-ui`;
      ctx.setLineDash(d.dash||[]);
      const tx=x=>x*zoom+pan.x;
      const ty=y=>y*zoom+pan.y;
      if(d.type==="line"||d.type==="arrow"){
        ctx.beginPath();ctx.moveTo(tx(d.x1),ty(d.y1));ctx.lineTo(tx(d.x2),ty(d.y2));ctx.stroke();
        if(d.type==="arrow"){
          const angle=Math.atan2(d.y2-d.y1,d.x2-d.x1);
          const as=12/zoom;
          ctx.beginPath();
          ctx.moveTo(tx(d.x2),ty(d.y2));
          ctx.lineTo(tx(d.x2)-as*Math.cos(angle-0.4),ty(d.y2)-as*Math.sin(angle-0.4));
          ctx.lineTo(tx(d.x2)-as*Math.cos(angle+0.4),ty(d.y2)-as*Math.sin(angle+0.4));
          ctx.closePath();ctx.fill();
        }
        if(d.type==="line"&&d.x2!==undefined){
          const len=Math.sqrt((d.x2-d.x1)**2+(d.y2-d.y1)**2).toFixed(1);
          ctx.fillStyle=d.color||"#00ff88";
          ctx.fillText(`${len}px`,tx((d.x1+d.x2)/2)+4,ty((d.y1+d.y2)/2)-4);
        }
      } else if(d.type==="angle"&&d.pts?.length>=2){
        ctx.beginPath();
        d.pts.forEach((p,i)=>i===0?ctx.moveTo(tx(p.x),ty(p.y)):ctx.lineTo(tx(p.x),ty(p.y)));
        if(d.pts.length<3) ctx.stroke();
        else{
          ctx.stroke();
          const [a,b,c]=d.pts;
          const ab=Math.atan2(a.y-b.y,a.x-b.x);
          const cb=Math.atan2(c.y-b.y,c.x-b.x);
          let ang=Math.abs((ab-cb)*180/Math.PI)%360;
          if(ang>180) ang=360-ang;
          ctx.fillText(`${ang.toFixed(1)}°`,tx(b.x)+6,ty(b.y)-6);
        }
      } else if(d.type==="rect"&&d.x2!==undefined){
        ctx.strokeRect(tx(d.x1),ty(d.y1),(d.x2-d.x1)*zoom,(d.y2-d.y1)*zoom);
        const w=Math.abs(d.x2-d.x1).toFixed(0),h=Math.abs(d.y2-d.y1).toFixed(0);
        ctx.fillText(`${w}×${h}px`,tx(Math.min(d.x1,d.x2))+2,ty(Math.min(d.y1,d.y2))-4);
      } else if(d.type==="text"&&d.text){
        ctx.font=`bold ${16/zoom}px system-ui`;
        ctx.fillText(d.text,tx(d.x),ty(d.y));
      }
      ctx.restore();
    };
    drawings.forEach(d=>drawShape(d));
    if(current) drawShape(current,0.7);
  },[drawings,current,zoom,pan]);

  // Canvas coords from event
  const evCoords=(e,el)=>{
    const r=el.getBoundingClientRect();
    const cx=(e.clientX??e.touches?.[0]?.clientX??0)-r.left;
    const cy=(e.clientY??e.touches?.[0]?.clientY??0)-r.top;
    return {x:(cx-pan.x)/zoom, y:(cy-pan.y)/zoom};
  };

  const onMouseDown=e=>{
    const overlay=overlayRef.current;
    const {x,y}=evCoords(e,overlay);
    if(tool==="pan"){setIsPanning(true);setPanStart({x:e.clientX-pan.x,y:e.clientY-pan.y});return;}
    if(tool==="text"){setTextInput({show:true,x,y,val:""});return;}
    if(tool==="angle"){
      setCurrent(c=>c&&c.type==="angle"&&c.pts.length<3
        ?{...c,pts:[...c.pts,{x,y}]}
        :{type:"angle",pts:[{x,y}],color:"#facc15",lw:2});
      return;
    }
    setCurrent({type:tool,x1:x,y1:y,x2:x,y2:y,color:tool==="line"?"#00ff88":tool==="arrow"?"#60a5fa":tool==="rect"?"#f87171":"#fff",lw:2});
  };

  const onMouseMove=e=>{
    const overlay=overlayRef.current;
    const {x,y}=evCoords(e,overlay);
    if(isPanning){setPan({x:e.clientX-panStart.x,y:e.clientY-panStart.y});return;}
    if(!current||tool==="angle"||tool==="text") return;
    setCurrent(c=>({...c,x2:x,y2:y}));
    if(tool==="line"&&current.x1!==undefined){
      const len=Math.sqrt((x-current.x1)**2+(y-current.y1)**2).toFixed(1);
      setMeasureResult(`Length: ${len}px`);
    }
  };

  const onMouseUp=e=>{
    setIsPanning(false);
    if(!current||tool==="angle"||tool==="text") return;
    if(tool==="line"||tool==="arrow"||tool==="rect"){
      const overlay=overlayRef.current;
      const {x,y}=evCoords(e,overlay);
      setDrawings(d=>[...d,{...current,x2:x,y2:y}]);
      setCurrent(null);
    }
  };

  const finalizeAngle=()=>{
    if(current?.type==="angle"&&current.pts.length===3){
      setDrawings(d=>[...d,current]);setCurrent(null);
    }
  };

  const addText=()=>{
    if(textInput.val.trim()){
      setDrawings(d=>[...d,{type:"text",x:textInput.x,y:textInput.y,text:textInput.val,color:"#fbbf24",lw:2}]);
    }
    setTextInput({show:false,x:0,y:0,val:""});
  };

  const undo=()=>setDrawings(d=>d.slice(0,-1));
  const clearAll=()=>{setDrawings([]);setCurrent(null);setMeasureResult("");};

  const download=()=>{
    const merge=document.createElement("canvas");
    const base=canvasRef.current;
    const over=overlayRef.current;
    if(!base) return;
    merge.width=base.width; merge.height=base.height;
    const ctx=merge.getContext("2d");
    ctx.filter=`brightness(${brightness}%) contrast(${contrast}%)`;
    ctx.drawImage(base,0,0);
    ctx.filter="none";
    ctx.drawImage(over,0,0);
    const a=document.createElement("a");
    a.href=merge.toDataURL("image/png");
    a.download=`orthoconsult_${file.name.replace(/\.[^.]+$/,"")}_annotated.png`;
    a.click();
  };

  const tools=[
    {id:"pan",icon:"✋",label:"Pan"},
    {id:"line",icon:"📏",label:"Measure"},
    {id:"angle",icon:"📐",label:"Angle"},
    {id:"rect",icon:"⬜",label:"Rectangle"},
    {id:"arrow",icon:"➡️",label:"Arrow"},
    {id:"text",icon:"T",label:"Text"},
  ];

  const overlayW=typeof window!=="undefined"?Math.min(window.innerWidth-40,900):900;
  const overlayH=Math.round(overlayW*0.65);

  return(
    <div style={{position:"fixed",inset:0,background:"#0d1117",zIndex:1000,display:"flex",flexDirection:"column",userSelect:"none"}}>

      {/* ── Top toolbar ── */}
      <div style={{background:"#161b22",borderBottom:"1px solid rgba(255,255,255,0.1)",padding:"8px 12px",display:"flex",alignItems:"center",gap:8,flexWrap:"wrap"}}>
        <span style={{color:"#fff",fontSize:13,fontWeight:600,marginRight:4}}>🔬 {file?.name}</span>
        <span style={{color:"rgba(255,255,255,0.4)",fontSize:11,marginRight:8}}>{info}</span>

        {/* Tools */}
        <div style={{display:"flex",gap:4,flexWrap:"wrap"}}>
          {tools.map(t=>(
            <button key={t.id} onClick={()=>{setTool(t.id);if(t.id!=="angle")setCurrent(null);}} className={`tool-btn${tool===t.id?" active":""}`}>
              {t.icon} {t.label}
            </button>
          ))}
        </div>

        <div style={{width:1,height:24,background:"rgba(255,255,255,0.15)",margin:"0 4px"}}/>

        {/* Undo / Clear */}
        <button onClick={undo} className="tool-btn" title="Undo last">↩ Undo</button>
        <button onClick={clearAll} className="tool-btn" title="Clear all annotations">🗑 Clear</button>

        {!isVideo&&<>
          <div style={{width:1,height:24,background:"rgba(255,255,255,0.15)",margin:"0 4px"}}/>
          <button onClick={download} className="tool-btn" style={{background:"#166534",borderColor:"#166534",color:"#fff"}}>⬇ Save annotated</button>
        </>}

        <button onClick={onClose} style={{marginLeft:"auto",background:"#ef4444",color:"#fff",border:"none",padding:"6px 16px",borderRadius:6,fontSize:13,fontWeight:700}}>✕ Close</button>
      </div>

      {/* ── Sliders ── */}
      <div style={{background:"#1c2128",borderBottom:"1px solid rgba(255,255,255,0.08)",padding:"6px 16px",display:"flex",gap:20,alignItems:"center",flexWrap:"wrap"}}>
        {[["☀️ Brightness",brightness,setBrightness,10,400],["◑ Contrast",contrast,setContrast,10,500],["🔍 Zoom",Math.round(zoom*100),(v)=>setZoom(v/100),20,800]].map(([label,val,setter,min,max])=>(
          <label key={label} style={{color:"rgba(255,255,255,0.7)",fontSize:12,display:"flex",alignItems:"center",gap:8}}>
            {label}
            <input type="range" min={min} max={max} value={val} onChange={e=>setter(Number(e.target.value))}
              style={{width:100,accentColor:B}}/>
            <span style={{color:A,fontSize:11,minWidth:36}}>{label.includes("Zoom")?`${val}%`:`${val}%`}</span>
          </label>
        ))}
        <button onClick={()=>{setBrightness(100);setContrast(100);setZoom(1);setPan({x:0,y:0});}} className="tool-btn">Reset view</button>
        {tool==="angle"&&current?.type==="angle"&&current.pts.length===3&&(
          <button onClick={finalizeAngle} className="tool-btn active">✓ Confirm angle</button>
        )}
        {measureResult&&<span style={{color:"#00ff88",fontSize:12,fontWeight:600}}>{measureResult}</span>}
      </div>

      {/* ── Hint bar ── */}
      <div style={{background:"#0d1117",padding:"4px 16px",display:"flex",gap:20,flexWrap:"wrap"}}>
        {tool==="pan"&&<span style={{fontSize:11,color:"rgba(255,255,255,0.35)"}}>Drag to pan · Scroll slider to zoom</span>}
        {tool==="line"&&<span style={{fontSize:11,color:"rgba(255,255,255,0.35)"}}>Click & drag to measure distance</span>}
        {tool==="angle"&&<span style={{fontSize:11,color:"rgba(255,255,255,0.35)"}}>Click 3 points to measure angle · Then confirm</span>}
        {tool==="rect"&&<span style={{fontSize:11,color:"rgba(255,255,255,0.35)"}}>Click & drag to draw rectangle</span>}
        {tool==="arrow"&&<span style={{fontSize:11,color:"rgba(255,255,255,0.35)"}}>Click & drag to draw arrow</span>}
        {tool==="text"&&<span style={{fontSize:11,color:"rgba(255,255,255,0.35)"}}>Click anywhere on image to add text label</span>}
      </div>

      {/* ── Main viewer area ── */}
      <div style={{flex:1,overflow:"hidden",display:"flex",alignItems:"center",justifyContent:"center",background:"#0d1117",position:"relative"}}>
        {isVideo?(
          <div style={{position:"relative",maxWidth:"90%",maxHeight:"85vh"}}>
            <video ref={videoRef} controls src={URL.createObjectURL(file)}
              style={{maxWidth:"100%",maxHeight:"80vh",borderRadius:8,filter:`brightness(${brightness}%) contrast(${contrast}%)`}}/>
          </div>
        ):(
          <div style={{position:"relative",display:"inline-block"}}>
            {/* base image canvas */}
            <canvas ref={canvasRef}
              style={{display:"block",filter:`brightness(${brightness}%) contrast(${contrast}%)`,transform:`translate(${pan.x}px,${pan.y}px) scale(${zoom})`,transformOrigin:"0 0",imageRendering:"pixelated"}}/>
            {/* annotation overlay canvas */}
            <canvas ref={overlayRef}
              width={canvasRef.current?.width||512}
              height={canvasRef.current?.height||512}
              onMouseDown={onMouseDown} onMouseMove={onMouseMove} onMouseUp={onMouseUp}
              style={{position:"absolute",inset:0,cursor:tool==="pan"?isPanning?"grabbing":"grab":"crosshair",transform:`translate(${pan.x}px,${pan.y}px) scale(${zoom})`,transformOrigin:"0 0"}}
              className="viewer-canvas"/>
          </div>
        )}

        {/* Text input popup */}
        {textInput.show&&(
          <div style={{position:"absolute",top:"50%",left:"50%",transform:"translate(-50%,-50%)",background:"#1c2128",border:"1px solid rgba(255,255,255,0.2)",borderRadius:10,padding:16,zIndex:100,minWidth:260}}>
            <div style={{color:"#fff",fontSize:13,marginBottom:8,fontWeight:600}}>Add text annotation</div>
            <input autoFocus type="text" value={textInput.val} onChange={e=>setTextInput(t=>({...t,val:e.target.value}))}
              onKeyDown={e=>e.key==="Enter"&&addText()}
              placeholder="Type annotation..."
              style={{width:"100%",background:"#0d1117",border:"1px solid rgba(255,255,255,0.2)",borderRadius:6,padding:"8px 10px",color:"#fff",fontSize:14,marginBottom:10}}/>
            <div style={{display:"flex",gap:8}}>
              <button onClick={addText} style={{background:B,color:"#fff",border:"none",padding:"7px 16px",borderRadius:6,fontSize:13,fontWeight:600,flex:1}}>Add</button>
              <button onClick={()=>setTextInput({show:false,x:0,y:0,val:""})} style={{background:"transparent",color:"rgba(255,255,255,0.6)",border:"1px solid rgba(255,255,255,0.2)",padding:"7px 12px",borderRadius:6,fontSize:13}}>Cancel</button>
            </div>
          </div>
        )}
      </div>

      {/* ── Drawing legend ── */}
      <div style={{background:"#161b22",borderTop:"1px solid rgba(255,255,255,0.08)",padding:"6px 16px",display:"flex",gap:16,flexWrap:"wrap",alignItems:"center"}}>
        <span style={{fontSize:11,color:"rgba(255,255,255,0.3)"}}>Annotations: {drawings.length}</span>
        {[["#00ff88","Measure line"],["#facc15","Angle"],["#f87171","Rectangle"],["#60a5fa","Arrow"],["#fbbf24","Text"]].map(([c,l])=>(
          <span key={l} style={{fontSize:11,color:c,display:"flex",alignItems:"center",gap:4}}>
            <span style={{width:12,height:2,background:c,display:"inline-block",verticalAlign:"middle"}}/>
            {l}
          </span>
        ))}
      </div>
    </div>
  );
}

/* ══════════════════════════════════════════
   FILE THUMBNAIL GRID (shared)
══════════════════════════════════════════ */
function FileGrid({fileNames,fileObjects,compact}){
  const [viewer,setViewer]=useState(null);
  const names=fileNames||[];
  const objs=fileObjects||[];
  const download=(f,name)=>{const url=URL.createObjectURL(f);const a=document.createElement("a");a.href=url;a.download=name;a.click();setTimeout(()=>URL.revokeObjectURL(url),1000);};
  if(names.length===0) return <div style={{color:"#9ca3af",fontSize:13}}>No files uploaded</div>;
  return(
    <div>
      {viewer&&<AdvancedViewer file={viewer} onClose={()=>setViewer(null)}/>}
      <div style={{display:"grid",gridTemplateColumns:`repeat(auto-fill,minmax(${compact?100:130}px,1fr))`,gap:8}}>
        {names.map((name,i)=>{
          const f=objs[i]||null;
          const isDcm=name.toLowerCase().endsWith(".dcm");
          const isVid=!!name.match(/\.(mp4|mov|avi|webm)$/i);
          const isImg=!!name.match(/\.(jpg|jpeg|png|gif|webp)$/i);
          const icon=isDcm?"🔬":isVid?"🎥":"🖼️";
          const [thumbUrl,setThumbUrl]=useState(null);
          useEffect(()=>{if(f&&isImg){const u=URL.createObjectURL(f);setThumbUrl(u);return()=>URL.revokeObjectURL(u);}}, [f]);
          return(
            <div key={i} style={{background:"#f8fafc",border:"0.5px solid #e0e4ea",borderRadius:8,overflow:"hidden",display:"flex",flexDirection:"column"}}>
              <div style={{height:compact?60:80,background:isDcm?"#000":isVid?"#1f2937":"#e5e7eb",display:"flex",alignItems:"center",justifyContent:"center",overflow:"hidden"}}>
                {thumbUrl?<img src={thumbUrl} alt="" style={{width:"100%",height:"100%",objectFit:"cover"}}/>:<span style={{fontSize:compact?22:28}}>{icon}</span>}
              </div>
              <div style={{padding:"6px 8px 4px",fontSize:10,color:"#374151",wordBreak:"break-all",lineHeight:1.3,flex:1}}>{name}</div>
              <div style={{display:"flex",gap:3,padding:"3px 6px 6px"}}>
                {f?<>
                  <button onClick={()=>setViewer(f)} style={{flex:1,background:N,color:"#fff",border:"none",padding:"4px 2px",borderRadius:4,fontSize:10,fontWeight:600,cursor:"pointer"}}>🔬 View</button>
                  <button onClick={()=>download(f,name)} style={{flex:1,background:B,color:"#fff",border:"none",padding:"4px 2px",borderRadius:4,fontSize:10,fontWeight:600,cursor:"pointer"}}>⬇ Save</button>
                </>:<div style={{fontSize:10,color:"#9ca3af",textAlign:"center",width:"100%",padding:"2px 0"}}>Not in session</div>}
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

        </>}

function PatientProfile({patient,setPatient,patients,setPatients}){
  const [form,setForm]=useState({name:patient.name,dob:patient.dob||"",phone:patient.phone||"",lang:patient.lang||"English"});
  const [pwForm,setPwForm]=useState({current:"",next:"",next2:""});
  const [saved,setSaved]=useState(false),  [pwMsg,setPwMsg]=useState("");
  const saveProfile=()=>{const u={...patient,...form};setPatient(u);setPatients(p=>p.map(x=>x.email===patient.email?u:x));setSaved(true);setTimeout(()=>setSaved(false),3000);};
  const changePw=()=>{
    if(pwForm.current!==patient.pw){setPwMsg("Current password incorrect.");return;}
    if(pwForm.next.length<6){setPwMsg("Min. 6 characters.");return;}
    if(pwForm.next!==pwForm.next2){setPwMsg("Passwords do not match.");return;}
    const u={...patient,pw:pwForm.next};setPatient(u);setPatients(p=>p.map(x=>x.email===patient.email?u:x));
    setPwMsg("✅ Password updated.");setPwForm({current:"",next:"",next2:""});
  };
  return(
    <div style={{maxWidth:600,margin:"0 auto",padding:"32px 20px"}}>
      <h2 style={{fontSize:22,fontWeight:700,color:N,marginBottom:24}}>My profile</h2>

        </div>
        <div className="two-col" style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14,marginBottom:14}}>

              <label style={{fontSize:12,color:"#6b7280",display:"block",marginBottom:4}}>{l}</label>

                style={{width:"100%",border:"0.5px solid #d1d5db",borderRadius:6,padding:"9px 12px",background:"#fafafa"}}/>

              {["English","Finnish / Suomi","Spanish / Español","Russian / Русский","Italian / Italiano"].map(l=><option key={l}>{l}</option>)}
            </select>

      </div>
      <div style={{background:"#fff",border:"0.5px solid #e0e4ea",borderRadius:12,padding:24}}>
        <div style={{fontSize:13,fontWeight:600,color:N,marginBottom:14}}>Change password</div>
        {[["Current password","current"],["New password","next"],["Confirm new","next2"]].map(([l,k])=>(
          <div key={k} style={{marginBottom:12}}>
            <label style={{fontSize:12,color:"#6b7280",display:"block",marginBottom:4}}>{l}</label>

        {pwMsg&&<div style={{background:pwMsg.startsWith("✅")?"#d1fae5":"#fef2f2",color:pwMsg.startsWith("✅")?"#065f46":"#dc2626",fontSize:13,padding:"8px 12px",borderRadius:6,marginBottom:12}}>{pwMsg}</div>}
        <button onClick={changePw} style={{background:"transparent",color:B,border:`0.5px solid ${B}`,padding:"8px 20px",borderRadius:8,fontSize:13,fontWeight:600}}>Update password</button>
      </div>

  const onDrop=useCallback(e=>{e.preventDefault();setDrag(false);addFiles(e.dataTransfer.files);},[]);

function PatientSubmit({patient,cases,setCases,setPage}){
  const [step,setStep]=useState(1);
  const [form,setForm]=useState({name:patient.name,dob:patient.dob||"",email:patient.email,phone:patient.phone||"",injury:INJURIES[0],date:"",notes:""});
  const [files,setFiles]=useState([]);
  const [done,setDone]=useState(false);
  const [caseId,setCaseId]=useState("");
  const submit=()=>{
    const id="C-"+String(cases.length+1).padStart(3,"0");
    setCases(p=>[{id,patientEmail:patient.email,name:form.name,dob:form.dob,email:form.email,phone:form.phone,injury:form.injury,date:form.date,notes:form.notes,files:files.map(f=>f.file.name),fileObjects:files.map(f=>f.file),status:"New",submitted:new Date().toISOString().slice(0,16).replace("T"," "),report:""},...p]);
    setCaseId(id);setDone(true);
  };
  if(done) return(
    <div style={{minHeight:"60vh",display:"flex",alignItems:"center",justifyContent:"center",padding:24}}>
      <div style={{background:"#fff",border:"0.5px solid #e0e4ea",borderRadius:16,padding:40,maxWidth:440,textAlign:"center"}}>
        <div style={{fontSize:52,marginBottom:16}}>✅</div>
        <h2 style={{color:N,fontSize:20,fontWeight:700,marginBottom:10}}>Case submitted!</h2>
        <div style={{display:"inline-block",background:"#eff6ff",color:B,fontSize:14,fontWeight:700,padding:"6px 18px",borderRadius:20,marginBottom:16}}>{caseId}</div>
        <p style={{color:"#6b7280",fontSize:14,lineHeight:1.7,marginBottom:24}}>Our team will review within <strong>48–72 hours</strong>.</p>
        <div style={{display:"flex",gap:10,justifyContent:"center",flexWrap:"wrap"}}>
          <button onClick={()=>setPage("pcases")} style={{background:N,color:"#fff",border:"none",padding:"10px 20px",borderRadius:8,fontSize:14,fontWeight:600}}>View my cases</button>
          <button onClick={()=>{setDone(false);setStep(1);setFiles([]);}} style={{background:"transparent",color:B,border:`0.5px solid ${B}`,padding:"10px 20px",borderRadius:8,fontSize:14,fontWeight:600}}>Submit another</button>
        </div>
      </div>
    </div>
  );
  const fld=(l,k,t="text",ph="")=>(
    <div key={k}>
      <label style={{fontSize:12,color:"#6b7280",display:"block",marginBottom:4}}>{l}</label>
      <input type={t} placeholder={ph} value={form[k]} onChange={e=>setForm(f=>({...f,[k]:e.target.value}))}
        style={{width:"100%",border:"0.5px solid #d1d5db",borderRadius:6,padding:"9px 12px",background:"#fafafa"}}/>
    </div>
  );
  return(
    <div style={{maxWidth:720,margin:"0 auto",padding:"32px 20px"}}>
      <h2 style={{color:N,fontSize:22,fontWeight:700,marginBottom:4}}>New consultation request</h2>
      <p style={{color:"#6b7280",fontSize:14,marginBottom:28}}>All data is end-to-end encrypted.</p>
      <div style={{display:"flex",marginBottom:32}}>
        {["Patient details","Upload files","Review & submit"].map((s,i)=>(
          <div key={s} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center"}}>
            <div style={{display:"flex",alignItems:"center",width:"100%"}}>
              {i>0&&<div style={{flex:1,height:2,background:step>i?B:"#e0e4ea"}}/>}
              <div style={{width:30,height:30,borderRadius:"50%",background:step>i?B:step===i+1?N:"#e0e4ea",color:step>i||step===i+1?"#fff":"#9ca3af",display:"flex",alignItems:"center",justifyContent:"center",fontSize:13,fontWeight:700,flexShrink:0}}>{step>i?"✓":i+1}</div>
              {i<2&&<div style={{flex:1,height:2,background:step>i+1?B:"#e0e4ea"}}/>}
            </div>
            <div style={{fontSize:11,color:step===i+1?N:"#9ca3af",marginTop:6,fontWeight:step===i+1?700:400,textAlign:"center"}}>{s}</div>
          </div>
        ))}
      </div>
      {step===1&&(
        <div style={{background:"#fff",border:"0.5px solid #e0e4ea",borderRadius:12,padding:24}}>
          <div className="two-col" style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14,marginBottom:14}}>
            {fld("Full name","name","text")} {fld("Date of birth","dob","date")} {fld("Email","email","email")} {fld("Phone","phone","tel","+358 ...")}
          </div>
          <div className="two-col" style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14,marginBottom:14}}>
            <div>
              <label style={{fontSize:12,color:"#6b7280",display:"block",marginBottom:4}}>Injury type</label>
              <select value={form.injury} onChange={e=>setForm(f=>({...f,injury:e.target.value}))} style={{width:"100%",border:"0.5px solid #d1d5db",borderRadius:6,padding:"9px 12px",background:"#fafafa"}}>
                {INJURIES.map(t=><option key={t}>{t}</option>)}
              </select>
            </div>
            {fld("Date of injury","date","date")}
          </div>
          <div style={{marginBottom:20}}>
            <label style={{fontSize:12,color:"#6b7280",display:"block",marginBottom:4}}>Clinical notes</label>
            <textarea value={form.notes} onChange={e=>setForm(f=>({...f,notes:e.target.value}))} placeholder="Describe symptoms, mechanism of injury, previous treatments..."
              style={{width:"100%",border:"0.5px solid #d1d5db",borderRadius:6,padding:"9px 12px",background:"#fafafa",height:90,resize:"none"}}/>
          </div>
          <button onClick={()=>setStep(2)} disabled={!form.name||!form.email} style={{background:form.name&&form.email?N:"#e0e4ea",color:form.name&&form.email?"#fff":"#9ca3af",border:"none",padding:"10px 28px",borderRadius:8,fontSize:14,fontWeight:600}}>Continue →</button>
        </div>
      )}
      {step===2&&(
        <div style={{background:"#fff",border:"0.5px solid #e0e4ea",borderRadius:12,padding:24}}>
          <div style={{fontSize:14,fontWeight:600,color:N,marginBottom:12}}>Upload MRI images, photos & videos</div>
          <UploadZone files={files} setFiles={setFiles}/>
          <div style={{display:"flex",justifyContent:"space-between",marginTop:20}}>
            <button onClick={()=>setStep(1)} style={{background:"transparent",color:"#6b7280",border:"0.5px solid #d1d5db",padding:"10px 20px",borderRadius:8,fontSize:14}}>← Back</button>
            <button onClick={()=>setStep(3)} style={{background:N,color:"#fff",border:"none",padding:"10px 24px",borderRadius:8,fontSize:14,fontWeight:600}}>Continue {files.length>0?`(${files.length} files)`:""} →</button>
          </div>
        </div>
      )}
      {step===3&&(
        <div>
          <div style={{background:"#fff",border:"0.5px solid #e0e4ea",borderRadius:12,padding:24,marginBottom:14}}>
            <div style={{fontSize:13,fontWeight:600,color:N,marginBottom:14}}>Review</div>
            <div className="two-col" style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:12}}>
              {[["Name",form.name],["DOB",form.dob],["Email",form.email],["Phone",form.phone],["Injury",form.injury],["Date",form.date]].map(([k,v])=>(
                <div key={k} style={{background:"#f8fafc",borderRadius:8,padding:"10px 12px"}}>
                  <div style={{fontSize:11,color:"#9ca3af",marginBottom:2}}>{k}</div>
                  <div style={{fontSize:13,color:N,fontWeight:600}}>{v||"—"}</div>
                </div>
              ))}
            </div>
            {form.notes&&<div style={{background:"#f8fafc",borderRadius:8,padding:"10px 12px"}}><div style={{fontSize:11,color:"#9ca3af",marginBottom:4}}>Notes</div><div style={{fontSize:13,color:"#374151",lineHeight:1.6}}>{form.notes}</div></div>}
          </div>
          <div style={{background:"#fff",border:"0.5px solid #e0e4ea",borderRadius:12,padding:24,marginBottom:14}}>
            <div style={{fontSize:13,fontWeight:600,color:N,marginBottom:10}}>Files ({files.length})</div>
            {files.length===0?<div style={{color:"#9ca3af",fontSize:13}}>No files uploaded.</div>:files.map((f,i)=>(
              <div key={i} style={{display:"flex",alignItems:"center",gap:10,padding:"7px 10px",background:"#f8fafc",borderRadius:6,marginBottom:6}}>
                <span>{f.type==="dicom"?"🔬":f.type==="video"?"🎥":"🖼️"}</span>
                <span style={{fontSize:13,color:"#374151",flex:1,wordBreak:"break-all"}}>{f.file.name}</span>
                <span style={{fontSize:11,color:"#9ca3af"}}>{(f.file.size/1024).toFixed(0)} KB</span>
              </div>
            ))}
          </div>
          <div style={{background:"#fffbeb",border:"0.5px solid #fcd34d",borderRadius:8,padding:"12px 16px",marginBottom:20,fontSize:13,color:"#92400e",lineHeight:1.6}}>
            ⚠️ By submitting you confirm this information is accurate and consent to processing by Orthoconsult medical staff.
          </div>
          <div style={{display:"flex",gap:10}}>
            <button onClick={()=>setStep(2)} style={{background:"transparent",color:"#6b7280",border:"0.5px solid #d1d5db",padding:"10px 20px",borderRadius:8,fontSize:14}}>← Back</button>
            <button onClick={submit} style={{background:B,color:"#fff",border:"none",padding:"10px 32px",borderRadius:8,fontSize:14,fontWeight:700}}>Submit case →</button>
          </div>
        </div>
      )}
    </div>
  );
}

function AdminPanel({cases,setCases,onLogout}){
  const [sel,setSel]=useState(null),  [report,setReport]=useState(""),  [filter,setFilter]=useState("All");
  const counts=f=>f==="All"?cases.length:cases.filter(c=>c.status===f).length;
  const filtered=filter==="All"?cases:cases.filter(c=>c.status===filter);
  const open=c=>{setSel(c);setReport(c.report||"");};
  const setStatus=(id,status)=>{setCases(p=>p.map(c=>c.id===id?{...c,status}:c));if(sel?.id===id)setSel(s=>({...s,status}));};
  const saveReport=id=>{setCases(p=>p.map(c=>c.id===id?{...c,report,status:"Report sent"}:c));setSel(s=>({...s,report,status:"Report sent"}));};
  const deleteCase=id=>{if(!window.confirm("Delete this case?"))return;setCases(p=>p.filter(c=>c.id!==id));if(sel?.id===id)setSel(null);};
  return(
    <div style={{display:"grid",gridTemplateColumns:sel?"300px 1fr":"1fr",minHeight:"calc(100vh - 56px)"}}>
      <div style={{background:N,padding:16,overflowY:"auto"}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:16}}>
          <div style={{color:"#fff",fontSize:14,fontWeight:700}}>Case queue</div>
          <button onClick={onLogout} style={{background:"rgba(255,255,255,0.1)",color:"rgba(255,255,255,0.7)",border:"none",padding:"4px 10px",borderRadius:6,fontSize:12}}>Sign out</button>
        </div>
        <div style={{display:"flex",gap:4,flexWrap:"wrap",marginBottom:14}}>
          {["All","New","In review","Report sent"].map(f=>(
            <button key={f} onClick={()=>setFilter(f)} style={{background:filter===f?B:"rgba(255,255,255,0.08)",color:filter===f?"#fff":"rgba(255,255,255,0.65)",border:"none",padding:"4px 9px",borderRadius:20,fontSize:11,cursor:"pointer"}}>
              {f} ({counts(f)})
            </button>
          ))}
        </div>
        {filtered.map(c=>(
          <div key={c.id} style={{background:sel?.id===c.id?"rgba(26,110,181,0.35)":"rgba(255,255,255,0.07)",border:sel?.id===c.id?`1px solid ${B}`:"1px solid transparent",borderRadius:8,padding:"12px",marginBottom:8}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:6}}>
              <div onClick={()=>open(c)} style={{flex:1,cursor:"pointer"}}>
                <div style={{color:"#fff",fontSize:13,fontWeight:700}}>{c.name}</div>
                <div style={{color:"rgba(255,255,255,0.5)",fontSize:11,marginTop:2}}>{c.id} · {c.injury.split(" /")[0]}</div>
                <div style={{color:"rgba(255,255,255,0.4)",fontSize:10,marginTop:4}}>{c.files.length} files · {c.submitted}</div>
              </div>
              <div style={{display:"flex",flexDirection:"column",alignItems:"flex-end",gap:6}}>
                <Badge status={c.status}/>
                <button onClick={()=>deleteCase(c.id)} style={{background:"#ef4444",color:"#fff",border:"none",padding:"3px 8px",borderRadius:4,fontSize:10,fontWeight:700}}>🗑 Delete</button>
              </div>
            </div>
          </div>
        ))}
      </div>
      {sel?(
        <div style={{padding:24,overflowY:"auto",background:"#f7f8fa"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:20,flexWrap:"wrap",gap:12}}>
            <div><h2 style={{fontSize:20,fontWeight:700,color:N}}>{sel.name}</h2><div style={{fontSize:13,color:"#6b7280"}}>{sel.id} · {sel.submitted}</div></div>
            <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
              {["New","In review","Report sent"].map(s=>(
                <button key={s} onClick={()=>setStatus(sel.id,s)} style={{background:sel.status===s?B:"#fff",color:sel.status===s?"#fff":"#374151",border:"0.5px solid #d1d5db",padding:"6px 10px",borderRadius:6,fontSize:12,fontWeight:sel.status===s?600:400}}>{s}</button>
              ))}
              <button onClick={()=>deleteCase(sel.id)} style={{background:"#ef4444",color:"#fff",border:"none",padding:"6px 12px",borderRadius:6,fontSize:12,fontWeight:700}}>🗑 Delete</button>
            </div>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(150px,1fr))",gap:10,marginBottom:16}}>
            {[["Injury",sel.injury],["Date",sel.date],["DOB",sel.dob],["Email",sel.email],["Phone",sel.phone]].map(([k,v])=>(
              <div key={k} style={{background:"#fff",border:"0.5px solid #e0e4ea",borderRadius:8,padding:"10px 14px"}}>
                <div style={{fontSize:11,color:"#9ca3af",marginBottom:3}}>{k}</div>
                <div style={{fontSize:13,color:N,fontWeight:600,wordBreak:"break-all"}}>{v||"—"}</div>
              </div>
            ))}
          </div>
          {sel.notes&&<div style={{background:"#fff",border:"0.5px solid #e0e4ea",borderRadius:8,padding:16,marginBottom:14}}>
            <div style={{fontSize:12,color:"#9ca3af",marginBottom:6}}>Clinical notes</div>
            <p style={{fontSize:14,color:"#374151",lineHeight:1.7}}>{sel.notes}</p>
          </div>}
          <div style={{background:"#fff",border:"0.5px solid #e0e4ea",borderRadius:8,padding:16,marginBottom:14}}>
            <div style={{fontSize:12,color:"#9ca3af",marginBottom:12}}>Files ({sel.files.length}) — click 🔬 View to open advanced viewer</div>
            <FileGrid fileNames={sel.files} fileObjects={sel.fileObjects||[]}/>
          </div>
          <div style={{background:"#fff",border:"0.5px solid #e0e4ea",borderRadius:8,padding:16}}>
            <div style={{fontSize:12,color:"#9ca3af",marginBottom:8}}>Consultation report</div>
            <textarea value={report} onChange={e=>setReport(e.target.value)} placeholder="Write your expert consultation report here..."
              style={{width:"100%",border:"0.5px solid #d1d5db",borderRadius:6,padding:"10px 12px",fontSize:14,height:150,resize:"vertical",fontFamily:"inherit"}}/>
            <button onClick={()=>saveReport(sel.id)} style={{marginTop:10,background:B,color:"#fff",border:"none",padding:"10px 20px",borderRadius:8,fontSize:14,fontWeight:700}}>Save & mark as Report sent</button>
          </div>
        </div>
      ):(
        <div style={{display:"flex",alignItems:"center",justifyContent:"center",color:"#9ca3af",fontSize:14,background:"#f7f8fa"}}>← Select a case to review</div>
      )}
    </div>
  );
}

function HowItWorks(){
  return(
    <div style={{padding:"48px 24px",background:"#f7f8fa"}}>
      <h2 style={{textAlign:"center",fontSize:22,fontWeight:700,color:N,marginBottom:32}}>How it works</h2>
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(190px,1fr))",gap:16,maxWidth:860,margin:"0 auto"}}>
        {[["1","Create account","Register and sign in to your secure patient portal."],["2","Submit your case","Fill in injury details and upload MRI DICOM, photos, or videos."],["3","Expert review","Our specialist team reviews your case within 48–72 hours."],["4","Receive report","Detailed written consultation report delivered to your portal."]].map(([n,t,d])=>(
          <div key={n} style={{background:"#fff",border:"0.5px solid #e0e4ea",borderRadius:12,padding:"20px 18px"}}>
            <div style={{width:32,height:32,background:N,color:"#fff",borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center",fontSize:14,fontWeight:700,marginBottom:12}}>{n}</div>
            <div style={{fontSize:14,fontWeight:600,color:N,marginBottom:6}}>{t}</div>
            <div style={{fontSize:13,color:"#6b7280",lineHeight:1.6}}>{d}</div>
          </div>
        ))}
      </div>
    </div>
  );
}

function About(){
  return(
    <div style={{padding:"48px 24px",maxWidth:860,margin:"0 auto"}}>
      <div className="two-col" style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:40,alignItems:"center"}}>
        <div>
          <div style={{fontSize:11,color:B,textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:10}}>About us</div>
          <h2 style={{fontSize:22,fontWeight:700,color:N,marginBottom:14}}>Our specialist team</h2>
          <p style={{fontSize:14,color:"#4b5563",lineHeight:1.8,marginBottom:12}}>Orthopaedic surgeons specialising in lower limb muscle and tendon injuries.</p>
          <p style={{fontSize:14,color:"#4b5563",lineHeight:1.8}}>Trusted by elite athletes worldwide. Clinics in Turku, Helsinki, Madrid and Milan.</p>
          <div style={{display:"flex",gap:8,flexWrap:"wrap",marginTop:20}}>
            {["FC Barcelona","PSG","Juventus","Olympics"].map(c=>(<span key={c} style={{background:"#eef2ff",color:N,fontSize:12,padding:"4px 12px",borderRadius:20,fontWeight:600}}>{c}</span>))}
          </div>
        </div>
        <div style={{background:`linear-gradient(135deg,${N},#0f3460)`,borderRadius:16,padding:28}}>
          <div style={{fontSize:13,color:A,marginBottom:16,fontWeight:600}}>Specialisations</div>
          {["Hamstring injuries & surgery","Quadriceps / Rectus femoris","Achilles tendon","Adductor injuries","Knee & ankle","Return-to-sport planning"].map(s=>(
            <div key={s} style={{display:"flex",alignItems:"center",gap:8,marginBottom:10}}><span style={{color:A}}>✓</span><span style={{fontSize:13,color:"rgba(255,255,255,0.85)"}}>{s}</span></div>
          ))}
        </div>
      </div>
    </div>
  );
}

function Footer({setPage}){
  return(
    <div style={{background:N,padding:"24px"}}>
      <div style={{maxWidth:860,margin:"0 auto",display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:16}}>
        <div style={{color:"rgba(255,255,255,0.5)",fontSize:13}}>© 2026 Orthoconsult · admin@orthoconsult.fi</div>
        <div style={{display:"flex",gap:16,alignItems:"center"}}>
          <button onClick={()=>setPage("home")} style={{background:"none",border:"none",color:"rgba(255,255,255,0.5)",fontSize:13,cursor:"pointer"}}>Home</button>
          {["FI","EN","ES","RU"].map(l=><span key={l} style={{color:"rgba(255,255,255,0.35)",fontSize:12,cursor:"pointer"}}>{l}</span>)}
        </div>
      </div>
    </div>
  );
}

function App(){
  const [page,setPage]=useState("home");
  const [adminIn,setAdminIn]=useState(false),  [loginErr,setLoginErr]=useState(false);
  const [cases,setCases]=useState(INIT_CASES);
  const [patients,setPatients]=useState(INIT_PATIENTS);
  const [patient,setPatient]=useState(null);
  const onAdmin=()=>adminIn?setPage("admin"):setPage("adminlogin");
  const onAdminLogin=(e,p)=>{if(e===ADMIN.email&&p===ADMIN.pw){setAdminIn(true);setPage("admin");setLoginErr(false);}else setLoginErr(true);};
  const onPatientLogin=p=>{setPatient(p);setPage("pcases");};
  const onPatientSignOut=()=>{setPatient(null);setPage("home");};
  const showFooter=!["admin","adminlogin"].includes(page);
  return(
    <div style={{minHeight:"100vh",display:"flex",flexDirection:"column"}}>
      <NavBar page={page} setPage={setPage} adminIn={adminIn} onAdmin={onAdmin} patient={patient} onSignOut={onPatientSignOut}/>
      <div style={{flex:1}}>
        {page==="home"&&<><Hero setPage={setPage} patient={patient}/><HowItWorks/><About/></>}
        {page==="pauth"&&<PatientAuth patients={patients} setPatients={setPatients} onLogin={onPatientLogin}/>}
        {page==="pcases"&&patient&&<PatientDashboard patient={patient} cases={cases} setPage={setPage}/>}
        {page==="psubmit"&&patient&&<PatientSubmit patient={patient} cases={cases} setCases={setCases} setPage={setPage}/>}
        {page==="pprofile"&&patient&&<PatientProfile patient={patient} setPatient={setPatient} patients={patients} setPatients={setPatients}/>}
        {page==="adminlogin"&&<AdminLogin onLogin={onAdminLogin} error={loginErr}/>}
        {page==="admin"&&adminIn&&<AdminPanel cases={cases} setCases={setCases} onLogout={()=>{setAdminIn(false);setPage("home");}}/>}
      </div>
      {showFooter&&<Footer setPage={setPage}/>}
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
