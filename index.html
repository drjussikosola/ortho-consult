<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Orthoconsult — Remote Consultation</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:system-ui,-apple-system,sans-serif}
body{background:#f7f8fa;min-height:100vh}
input,select,textarea{font-family:inherit;font-size:14px;outline:none;color:#1a1a2e}
button{font-family:inherit;cursor:pointer}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:#f1f1f1}::-webkit-scrollbar-thumb{background:#c1c1c1;border-radius:3px}
@media(max-width:600px){.two-col{grid-template-columns:1fr!important}.hide-mobile{display:none!important}.nav-links button{padding:5px 8px!important;font-size:12px!important}}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useRef,useCallback,useEffect}=React;
const N="#0a2240",B="#1a6eb5",A="#4db8ff";
const ADMIN={email:"admin@orthoconsult.fi",pw:"Lempainen2026"};
const INJURIES=["Hamstring / Takareisi","Quadriceps / Etureisi","Achilles tendon / Akilles","Adductor / Lähentäjä","Knee / Polvi","Ankle / Nilkka","Other / Muu"];

const INIT_CASES=[
  {id:"C-001",patientEmail:"matias@example.com",name:"Matías Fernández",dob:"1994-03-12",email:"matias@example.com",phone:"+34 600 000 001",injury:"Hamstring / Takareisi",date:"2026-04-22",notes:"Acute proximal hamstring pain after sprint.",files:[],fileObjects:[],status:"New",submitted:"2026-05-07 14:32",report:""},
  {id:"C-002",patientEmail:"aleksi@example.com",name:"Aleksi Korhonen",dob:"1990-07-08",email:"aleksi@example.com",phone:"+358 40 000 0002",injury:"Achilles tendon / Akilles",date:"2026-04-18",notes:"Chronic Achilles tendinopathy. Conservative treatment failed.",files:[],fileObjects:[],status:"In review",submitted:"2026-05-06 09:15",report:""},
  {id:"C-003",patientEmail:"sofia@example.com",name:"Sofia Rossi",dob:"1998-11-23",email:"sofia@example.com",phone:"+39 02 000 003",injury:"Quadriceps / Etureisi",date:"2026-04-10",notes:"Complete rectus femoris rupture during football match.",files:[],fileObjects:[],status:"Report sent",submitted:"2026-05-04 17:44",report:"MRI confirms complete proximal rectus femoris tendon rupture with 2.3 cm retraction. Surgical repair recommended within 2 weeks for optimal functional outcome."},
];

const INIT_PATIENTS=[
  {name:"Matías Fernández",email:"matias@example.com",pw:"Patient2026",dob:"1994-03-12",phone:"+34 600 000 001",lang:"English"},
  {name:"Aleksi Korhonen",email:"aleksi@example.com",pw:"Patient2026",dob:"1990-07-08",phone:"+358 40 000 0002",lang:"Finnish / Suomi"},
  {name:"Sofia Rossi",email:"sofia@example.com",pw:"Patient2026",dob:"1998-11-23",phone:"+39 02 000 003",lang:"Italian / Italiano"},
];

/* ── helpers ── */
function Badge({status}){
  const m={New:["#dbeafe","#1d4ed8"],"In review":["#fef3c7","#92400e"],"Report sent":["#d1fae5","#065f46"]};
  const [bg,c]=m[status]||["#f3f4f6","#374151"];
  return <span style={{background:bg,color:c,fontSize:11,padding:"3px 10px",borderRadius:20,fontWeight:600,whiteSpace:"nowrap"}}>{status}</span>;
}

function Inp({label,k,type="text",ph="",val,onChange,half}){
  return(
    <div>
      <label style={{fontSize:12,color:"#6b7280",display:"block",marginBottom:4}}>{label}</label>
      <input type={type} placeholder={ph} value={val} onChange={e=>onChange(e.target.value)}
        style={{width:"100%",border:"0.5px solid #d1d5db",borderRadius:6,padding:"9px 12px",background:"#fafafa"}}/>
    </div>
  );
}

/* ── NavBar ── */
function NavBar({page,setPage,adminIn,onAdmin,patient,onPatientPortal,onSignOut}){
  const [menu,setMenu]=useState(false);
  return(
    <nav style={{background:N,padding:"0 16px",display:"flex",alignItems:"center",justifyContent:"space-between",height:56,position:"sticky",top:0,zIndex:200,boxShadow:"0 1px 0 rgba(255,255,255,0.08)"}}>
      <div onClick={()=>setPage("home")} style={{display:"flex",alignItems:"center",gap:10,cursor:"pointer",flexShrink:0}}>
        <div style={{width:34,height:34,background:B,borderRadius:8,display:"flex",alignItems:"center",justifyContent:"center",color:"#fff",fontSize:18,fontWeight:700}}>+</div>
        <div className="hide-mobile">
          <div style={{color:"#fff",fontSize:14,fontWeight:600}}>Orthoconsult</div>
          <div style={{color:A,fontSize:10}}>Remote Consultation</div>
        </div>
      </div>
      <div className="nav-links" style={{display:"flex",gap:4,alignItems:"center"}}>
        <button onClick={()=>setPage("home")} style={{background:page==="home"?"rgba(255,255,255,0.14)":"transparent",color:page==="home"?"#fff":"rgba(255,255,255,0.65)",border:"none",padding:"6px 12px",borderRadius:6,fontSize:13}}>Home</button>

        {patient?(
          <div style={{position:"relative"}}>
            <div onClick={()=>setMenu(m=>!m)} style={{display:"flex",alignItems:"center",gap:8,cursor:"pointer",padding:"4px 10px",borderRadius:6,background:"rgba(255,255,255,0.08)"}}>
              <div style={{width:28,height:28,borderRadius:"50%",background:B,display:"flex",alignItems:"center",justifyContent:"center",color:"#fff",fontSize:12,fontWeight:700}}>
                {patient.name.split(" ").map(n=>n[0]).join("").slice(0,2)}
              </div>
              <span style={{color:"#fff",fontSize:13}}>{patient.name.split(" ")[0]}</span>
              <span style={{color:"rgba(255,255,255,0.5)",fontSize:10}}>▾</span>
            </div>
            {menu&&(
              <div style={{position:"absolute",top:44,right:0,background:"#fff",border:"0.5px solid #e0e4ea",borderRadius:10,padding:8,minWidth:180,boxShadow:"0 4px 20px rgba(0,0,0,0.12)",zIndex:300}}>
                <div style={{padding:"8px 12px",fontSize:13,color:N,fontWeight:700,borderBottom:"0.5px solid #f3f4f6"}}>{patient.name}</div>
                <div style={{padding:"8px 12px",fontSize:12,color:"#6b7280",borderBottom:"0.5px solid #f3f4f6"}}>{patient.email}</div>
                {[["📋 My cases","pcases"],["➕ New consultation","psubmit"],["👤 My profile","pprofile"]].map(([l,p])=>(
                  <div key={p} onClick={()=>{setPage(p);setMenu(false);}} style={{padding:"9px 12px",fontSize:13,color:N,cursor:"pointer",borderRadius:6}}
                    onMouseEnter={e=>e.currentTarget.style.background="#f3f4f6"}
                    onMouseLeave={e=>e.currentTarget.style.background="transparent"}>{l}</div>
                ))}
                <div onClick={()=>{onSignOut();setMenu(false);}} style={{padding:"9px 12px",fontSize:13,color:"#ef4444",cursor:"pointer",borderTop:"0.5px solid #f3f4f6",borderRadius:6}}>Sign out</div>
              </div>
            )}
          </div>
        ):(
          <button onClick={()=>setPage("pauth")} style={{background:"rgba(255,255,255,0.1)",color:"#fff",border:"0.5px solid rgba(255,255,255,0.2)",padding:"6px 12px",borderRadius:6,fontSize:13}}>
            Patient sign-in
          </button>
        )}

        <button onClick={onAdmin} style={{background:B,color:"#fff",border:"none",padding:"6px 12px",borderRadius:6,fontSize:13,fontWeight:500}}>
          🔒 {adminIn?"Admin":"Admin"}
        </button>
      </div>
    </nav>
  );
}

/* ── Patient Auth (sign-in + sign-up tabs) ── */
function PatientAuth({patients,setPatients,onLogin}){
  const [tab,setTab]=useState("in");
  const [email,setEmail]=useState("");
  const [pw,setPw]=useState("");
  const [err,setErr]=useState("");
  const [reg,setReg]=useState({name:"",email:"",pw:"",pw2:"",dob:"",phone:""});
  const [regErr,setRegErr]=useState("");
  const [regDone,setRegDone]=useState(false);

  const tryLogin=()=>{
    const p=patients.find(p=>p.email===email&&p.pw===pw);
    if(p){onLogin(p);setErr("");}
    else setErr("Invalid email or password.");
  };

  const tryRegister=()=>{
    if(!reg.name||!reg.email||!reg.pw){setRegErr("Please fill in all required fields.");return;}
    if(reg.pw!==reg.pw2){setRegErr("Passwords do not match.");return;}
    if(patients.find(p=>p.email===reg.email)){setRegErr("An account with this email already exists.");return;}
    const newP={name:reg.name,email:reg.email,pw:reg.pw,dob:reg.dob,phone:reg.phone,lang:"English"};
    setPatients(p=>[...p,newP]);
    setRegDone(true);
  };

  const tabBtn=(id,label)=>(
    <button onClick={()=>{setTab(id);setErr("");setRegErr("");}} style={{flex:1,padding:"10px",border:"none",background:tab===id?N:"transparent",color:tab===id?"#fff":"#6b7280",fontSize:14,fontWeight:tab===id?700:400,borderRadius:8,transition:"all 0.15s"}}>{label}</button>
  );

  return(
    <div style={{minHeight:"80vh",display:"flex",alignItems:"center",justifyContent:"center",padding:24,background:"#f7f8fa"}}>
      <div style={{background:"#fff",border:"0.5px solid #e0e4ea",borderRadius:16,padding:"32px",width:"100%",maxWidth:420,boxShadow:"0 4px 24px rgba(0,0,0,0.07)"}}>
        <div style={{textAlign:"center",marginBottom:24}}>
          <div style={{width:52,height:52,background:N,borderRadius:12,display:"flex",alignItems:"center",justifyContent:"center",fontSize:26,margin:"0 auto 12px"}}>🏥</div>
          <h2 style={{fontSize:20,fontWeight:700,color:N}}>Patient Portal</h2>
          <p style={{fontSize:13,color:"#6b7280",marginTop:4}}>Sign in or create a new account</p>
        </div>

        <div style={{display:"flex",background:"#f3f4f6",borderRadius:10,padding:4,marginBottom:24}}>
          {tabBtn("in","Sign in")}
          {tabBtn("up","Create account")}
        </div>

        {tab==="in"&&(
          <>
            <div style={{marginBottom:14}}>
              <label style={{fontSize:12,color:"#6b7280",display:"block",marginBottom:4}}>Email address</label>
              <input type="email" value={email} onChange={e=>setEmail(e.target.value)} placeholder="you@example.com"
                style={{width:"100%",border:"0.5px solid #d1d5db",borderRadius:6,padding:"10px 12px"}}
                onKeyDown={e=>e.key==="Enter"&&tryLogin()}/>
            </div>
            <div style={{marginBottom:20}}>
              <label style={{fontSize:12,color:"#6b7280",display:"block",marginBottom:4}}>Password</label>
              <input type="password" value={pw} onChange={e=>setPw(e.target.value)} placeholder="••••••••"
                style={{width:"100%",border:"0.5px solid #d1d5db",borderRadius:6,padding:"10px 12px"}}
                onKeyDown={e=>e.key==="Enter"&&tryLogin()}/>
            </div>
            {err&&<div style={{background:"#fef2f2",color:"#dc2626",fontSize:13,padding:"8px 12px",borderRadius:6,marginBottom:14}}>{err}</div>}
            <button onClick={tryLogin} style={{width:"100%",background:N,color:"#fff",border:"none",padding:11,borderRadius:8,fontSize:14,fontWeight:700,marginBottom:14}}>Sign in →</button>
            <div style={{background:"#f0f9ff",borderRadius:8,padding:"10px 12px",fontSize:12,color:"#0369a1",lineHeight:1.6}}>
              <strong>Demo:</strong> matias@example.com / Patient2026
            </div>
          </>
        )}

        {tab==="up"&&!regDone&&(
          <>
            <div className="two-col" style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:12}}>
              {[["Full name *","name","text","Your full name"],["Email address *","email","email","you@example.com"],["Password *","pw","password","Min. 8 characters"],["Confirm password *","pw2","password","Repeat password"],["Date of birth","dob","date",""],["Phone number","phone","tel","+358 ..."]].map(([l,k,t,ph])=>(
                <div key={k} style={{gridColumn:k==="name"||k==="email"?"1 / -1":"auto"}}>
                  <label style={{fontSize:12,color:"#6b7280",display:"block",marginBottom:4}}>{l}</label>
                  <input type={t} placeholder={ph} value={reg[k]} onChange={e=>setReg(r=>({...r,[k]:e.target.value}))}
                    style={{width:"100%",border:"0.5px solid #d1d5db",borderRadius:6,padding:"9px 12px"}}/>
                </div>
              ))}
            </div>
            {regErr&&<div style={{background:"#fef2f2",color:"#dc2626",fontSize:13,padding:"8px 12px",borderRadius:6,marginBottom:14}}>{regErr}</div>}
            <button onClick={tryRegister} style={{width:"100%",background:B,color:"#fff",border:"none",padding:11,borderRadius:8,fontSize:14,fontWeight:700}}>Create account →</button>
          </>
        )}

        {tab==="up"&&regDone&&(
          <div style={{textAlign:"center"}}>
            <div style={{fontSize:48,marginBottom:12}}>✅</div>
            <h3 style={{color:N,fontSize:18,fontWeight:700,marginBottom:8}}>Account created!</h3>
            <p style={{color:"#6b7280",fontSize:14,marginBottom:20,lineHeight:1.7}}>Your account has been created. You can now sign in to submit consultations.</p>
            <button onClick={()=>{setTab("in");setRegDone(false);setEmail(reg.email);}} style={{background:N,color:"#fff",border:"none",padding:"10px 24px",borderRadius:8,fontSize:14,fontWeight:600}}>Go to sign in →</button>
          </div>
        )}
      </div>
    </div>
  );
}

/* ── Patient Dashboard ── */
function PatientDashboard({patient,cases,setPage}){
  const myCases=cases.filter(c=>c.patientEmail===patient.email);
  const stats=[["Total cases",myCases.length],["In review",myCases.filter(c=>c.status==="In review").length],["Reports ready",myCases.filter(c=>c.status==="Report sent").length]];
  return(
    <div style={{maxWidth:860,margin:"0 auto",padding:"32px 20px"}}>
      <div style={{background:`linear-gradient(135deg,${N},#0f3460)`,borderRadius:16,padding:"24px 28px",marginBottom:28,display:"flex",alignItems:"center",justifyContent:"space-between",flexWrap:"wrap",gap:16}}>
        <div>
          <div style={{color:A,fontSize:12,marginBottom:4}}>Welcome back</div>
          <div style={{color:"#fff",fontSize:22,fontWeight:700}}>{patient.name}</div>
          <div style={{color:"rgba(255,255,255,0.55)",fontSize:13,marginTop:2}}>{patient.email}</div>
        </div>
        <button onClick={()=>setPage("psubmit")} style={{background:B,color:"#fff",border:"none",padding:"10px 20px",borderRadius:8,fontSize:14,fontWeight:600}}>+ New consultation</button>
      </div>

      <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:12,marginBottom:28}}>
        {stats.map(([l,v])=>(
          <div key={l} style={{background:"#fff",border:"0.5px solid #e0e4ea",borderRadius:12,padding:"18px 20px"}}>
            <div style={{fontSize:11,color:"#9ca3af",marginBottom:4,textTransform:"uppercase",letterSpacing:"0.06em"}}>{l}</div>
            <div style={{fontSize:28,fontWeight:700,color:N}}>{v}</div>
          </div>
        ))}
      </div>

      <div style={{fontSize:16,fontWeight:700,color:N,marginBottom:14}}>My consultation history</div>
      {myCases.length===0?(
        <div style={{background:"#fff",border:"2px dashed #e0e4ea",borderRadius:12,padding:"48px 24px",textAlign:"center"}}>
          <div style={{fontSize:40,marginBottom:12}}>🏥</div>
          <div style={{fontSize:15,fontWeight:600,color:N,marginBottom:8}}>No cases yet</div>
          <p style={{fontSize:14,color:"#6b7280",marginBottom:20}}>Submit your first consultation request with MRI images to get started.</p>
          <button onClick={()=>setPage("psubmit")} style={{background:N,color:"#fff",border:"none",padding:"10px 24px",borderRadius:8,fontSize:14,fontWeight:600}}>Submit a case →</button>
        </div>
      ):(
        <div style={{display:"flex",flexDirection:"column",gap:12}}>
          {myCases.map(c=>(
            <div key={c.id} style={{background:"#fff",border:"0.5px solid #e0e4ea",borderRadius:12,padding:"18px 20px"}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",flexWrap:"wrap",gap:12}}>
                <div>
                  <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:6}}>
                    <span style={{fontSize:13,fontWeight:700,color:N}}>{c.id}</span>
                    <Badge status={c.status}/>
                  </div>
                  <div style={{fontSize:15,fontWeight:600,color:N,marginBottom:4}}>{c.injury}</div>
                  <div style={{display:"flex",gap:16,flexWrap:"wrap"}}>
                    <span style={{fontSize:12,color:"#6b7280"}}>📅 {c.date}</span>
                    <span style={{fontSize:12,color:"#6b7280"}}>🗂️ {c.files.length} files</span>
                    <span style={{fontSize:12,color:"#6b7280"}}>📬 {c.submitted}</span>
                  </div>
                </div>
              </div>
              {c.status==="Report sent"&&c.report&&(
                <div style={{marginTop:14,background:"#f0fdf4",border:"0.5px solid #86efac",borderRadius:8,padding:"14px 16px"}}>
                  <div style={{fontSize:11,color:"#166534",fontWeight:700,marginBottom:6,textTransform:"uppercase",letterSpacing:"0.06em"}}>Consultation report</div>
                  <p style={{fontSize:14,color:"#1e293b",lineHeight:1.8}}>{c.report}</p>
                </div>
              )}
              {c.status==="In review"&&(
                <div style={{marginTop:12,background:"#fffbeb",border:"0.5px solid #fcd34d",borderRadius:8,padding:"10px 14px",fontSize:13,color:"#92400e"}}>
                  ⏳ Your case is being reviewed. You will be notified when the report is ready.
                </div>
              )}
              {c.status==="New"&&(
                <div style={{marginTop:12,background:"#eff6ff",border:"0.5px solid #bfdbfe",borderRadius:8,padding:"10px 14px",fontSize:13,color:"#1d4ed8"}}>
                  📋 Case received. Review will begin within 24 hours.
                </div>
              )}
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

/* ── Patient Profile ── */
function PatientProfile({patient,setPatient,patients,setPatients}){
  const [form,setForm]=useState({name:patient.name,dob:patient.dob||"",phone:patient.phone||"",lang:patient.lang||"English"});
  const [pwForm,setPwForm]=useState({current:"",next:"",next2:""});
  const [saved,setSaved]=useState(false);
  const [pwMsg,setPwMsg]=useState("");

  const saveProfile=()=>{
    const updated={...patient,...form};
    setPatient(updated);
    setPatients(p=>p.map(x=>x.email===patient.email?updated:x));
    setSaved(true);setTimeout(()=>setSaved(false),3000);
  };

  const changePw=()=>{
    if(pwForm.current!==patient.pw){setPwMsg("Current password is incorrect.");return;}
    if(pwForm.next.length<6){setPwMsg("New password must be at least 6 characters.");return;}
    if(pwForm.next!==pwForm.next2){setPwMsg("New passwords do not match.");return;}
    const updated={...patient,pw:pwForm.next};
    setPatient(updated);
    setPatients(p=>p.map(x=>x.email===patient.email?updated:x));
    setPwMsg("✅ Password updated successfully.");
    setPwForm({current:"",next:"",next2:""});
  };

  return(
    <div style={{maxWidth:600,margin:"0 auto",padding:"32px 20px"}}>
      <h2 style={{fontSize:22,fontWeight:700,color:N,marginBottom:24}}>My profile</h2>

      <div style={{background:"#fff",border:"0.5px solid #e0e4ea",borderRadius:12,padding:24,marginBottom:16}}>
        <div style={{display:"flex",alignItems:"center",gap:16,marginBottom:24}}>
          <div style={{width:56,height:56,borderRadius:"50%",background:B,display:"flex",alignItems:"center",justifyContent:"center",color:"#fff",fontSize:20,fontWeight:700}}>
            {patient.name.split(" ").map(n=>n[0]).join("").slice(0,2)}
          </div>
          <div>
            <div style={{fontSize:16,fontWeight:700,color:N}}>{patient.name}</div>
            <div style={{fontSize:13,color:"#6b7280"}}>{patient.email}</div>
          </div>
        </div>

        <div style={{fontSize:13,fontWeight:600,color:N,marginBottom:14}}>Personal details</div>
        <div className="two-col" style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14,marginBottom:14}}>
          {[["Full name","name","text"],["Date of birth","dob","date"],["Phone number","phone","tel"]].map(([l,k,t])=>(
            <div key={k} style={{gridColumn:k==="name"?"1 / -1":"auto"}}>
              <label style={{fontSize:12,color:"#6b7280",display:"block",marginBottom:4}}>{l}</label>
              <input type={t} value={form[k]} onChange={e=>setForm(f=>({...f,[k]:e.target.value}))}
                style={{width:"100%",border:"0.5px solid #d1d5db",borderRadius:6,padding:"9px 12px",background:"#fafafa"}}/>
            </div>
          ))}
          <div>
            <label style={{fontSize:12,color:"#6b7280",display:"block",marginBottom:4}}>Preferred language</label>
            <select value={form.lang} onChange={e=>setForm(f=>({...f,lang:e.target.value}))}
              style={{width:"100%",border:"0.5px solid #d1d5db",borderRadius:6,padding:"9px 12px",background:"#fafafa"}}>
              {["English","Finnish / Suomi","Spanish / Español","Russian / Русский","Italian / Italiano"].map(l=><option key={l}>{l}</option>)}
            </select>
          </div>
        </div>
        {saved&&<div style={{background:"#d1fae5",color:"#065f46",fontSize:13,padding:"8px 14px",borderRadius:6,marginBottom:12,fontWeight:600}}>✓ Profile saved</div>}
        <button onClick={saveProfile} style={{background:N,color:"#fff",border:"none",padding:"10px 24px",borderRadius:8,fontSize:14,fontWeight:600}}>Save changes</button>
      </div>

      <div style={{background:"#fff",border:"0.5px solid #e0e4ea",borderRadius:12,padding:24}}>
        <div style={{fontSize:13,fontWeight:600,color:N,marginBottom:14}}>Change password</div>
        <div style={{display:"flex",flexDirection:"column",gap:12,marginBottom:14}}>
          {[["Current password","current"],["New password","next"],["Confirm new password","next2"]].map(([l,k])=>(
            <div key={k}>
              <label style={{fontSize:12,color:"#6b7280",display:"block",marginBottom:4}}>{l}</label>
              <input type="password" placeholder="••••••••" value={pwForm[k]} onChange={e=>setPwForm(f=>({...f,[k]:e.target.value}))}
                style={{width:"100%",border:"0.5px solid #d1d5db",borderRadius:6,padding:"9px 12px",background:"#fafafa"}}/>
            </div>
          ))}
        </div>
        {pwMsg&&<div style={{background:pwMsg.startsWith("✅")?"#d1fae5":"#fef2f2",color:pwMsg.startsWith("✅")?"#065f46":"#dc2626",fontSize:13,padding:"8px 12px",borderRadius:6,marginBottom:12}}>{pwMsg}</div>}
        <button onClick={changePw} style={{background:"transparent",color:B,border:`0.5px solid ${B}`,padding:"8px 20px",borderRadius:8,fontSize:13,fontWeight:600}}>Update password</button>
      </div>
    </div>
  );
}

/* ── Upload zone ── */
function UploadZone({files,setFiles}){
  const [drag,setDrag]=useState(false);
  const dcmRef=useRef(),imgRef=useRef(),vidRef=useRef(),camRef=useRef();
  const addFiles=newF=>{
    const arr=Array.from(newF);
    setFiles(p=>[...p,...arr.map(f=>({file:f,preview:f.type.startsWith("image/")?URL.createObjectURL(f):null,type:f.name.toLowerCase().endsWith(".dcm")?"dicom":f.type.startsWith("video/")?"video":"image"}))]);
  };
  const onDrop=useCallback(e=>{e.preventDefault();setDrag(false);addFiles(e.dataTransfer.files);},[]);
  const rm=i=>setFiles(p=>p.filter((_,x)=>x!==i));
  const typeIcon={dicom:"🔬",video:"🎥",image:"🖼️"};
  const typeLabel={dicom:"DICOM",video:"Video",image:"Image"};
  return(
    <div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(130px,1fr))",gap:10,marginBottom:14}}>
        {[{icon:"🔬",label:"DICOM files",sub:".dcm",ref:dcmRef,accept:".dcm",capture:null},{icon:"🖼️",label:"Photos / MRI",sub:"jpg, png",ref:imgRef,accept:"image/*",capture:null},{icon:"🎥",label:"Videos",sub:"mp4, mov",ref:vidRef,accept:"video/*",capture:null},{icon:"📷",label:"Take photo",sub:"Camera",ref:camRef,accept:"image/*",capture:"environment"}].map(({icon,label,sub,ref,accept,capture})=>(
          <button key={label} onClick={()=>ref.current.click()}
            style={{background:"#fff",border:`1.5px solid ${B}`,borderRadius:10,padding:"14px 10px",display:"flex",flexDirection:"column",alignItems:"center",gap:6}}
            onMouseEnter={e=>e.currentTarget.style.background="#eff6ff"} onMouseLeave={e=>e.currentTarget.style.background="#fff"}>
            <span style={{fontSize:24}}>{icon}</span>
            <span style={{fontSize:11,fontWeight:600,color:N,textAlign:"center",lineHeight:1.3}}>{label}</span>
            <span style={{fontSize:10,color:"#9ca3af"}}>{sub}</span>
            <input ref={ref} type="file" multiple accept={accept} capture={capture||undefined} onChange={e=>addFiles(e.target.files)} style={{display:"none"}}/>
          </button>
        ))}
      </div>
      <div onDragOver={e=>{e.preventDefault();setDrag(true);}} onDragLeave={()=>setDrag(false)} onDrop={onDrop}
        style={{border:`2px dashed ${drag?B:"#d1d5db"}`,borderRadius:12,padding:"20px",textAlign:"center",background:drag?"#eff6ff":"#fafafa",marginBottom:12}}>
        <div style={{fontSize:13,color:"#6b7280"}}>Or <strong>drag & drop</strong> any files here</div>
        <div style={{fontSize:11,color:"#9ca3af",marginTop:4}}>DICOM · JPEG · PNG · MP4 · MOV · up to 500 MB</div>
      </div>
      <div style={{background:"#f0fdf4",border:"0.5px solid #86efac",borderRadius:8,padding:"8px 12px",fontSize:12,color:"#166534",marginBottom:12,display:"flex",gap:8}}>
        <span>📱</span><span><strong>On smartphone:</strong> tap "Take photo" to use your camera, or "Photos / MRI" to pick from your gallery.</span>
      </div>
      {files.length>0&&(
        <div>
          <div style={{fontSize:12,color:"#6b7280",marginBottom:8,fontWeight:600}}>{files.length} file{files.length>1?"s":""} selected</div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(120px,1fr))",gap:8}}>
            {files.map((f,i)=>(
              <div key={i} style={{background:"#f8fafc",border:"0.5px solid #e0e4ea",borderRadius:8,padding:"8px",position:"relative",cursor:"pointer"}}>
                {f.preview?<img src={f.preview} alt="" style={{width:"100%",height:60,objectFit:"cover",borderRadius:4,marginBottom:4}}/>:
                  <div style={{width:"100%",height:60,background:f.type==="dicom"?"#000":"#1f2937",borderRadius:4,marginBottom:4,display:"flex",alignItems:"center",justifyContent:"center",fontSize:22}}>{typeIcon[f.type]}</div>}
                <div style={{fontSize:10,color:"#6b7280",fontWeight:600}}>{typeLabel[f.type]}</div>
                <div style={{fontSize:10,color:N,wordBreak:"break-all",lineHeight:1.2}}>{f.file.name}</div>
                <button onClick={e=>{e.stopPropagation();rm(i);}} style={{position:"absolute",top:4,right:4,background:"#fee2e2",border:"none",color:"#ef4444",width:18,height:18,borderRadius:"50%",fontSize:10,padding:0}}>✕</button>
              </div>
            ))}
          </div>
        </div>
      )}
    </div>
  );
}

/* ── Patient Submit ── */
function PatientSubmit({patient,cases,setCases,setPage}){
  const [step,setStep]=useState(1);
  const [form,setForm]=useState({name:patient.name,dob:patient.dob||"",email:patient.email,phone:patient.phone||"",injury:INJURIES[0],date:"",notes:""});
  const [files,setFiles]=useState([]);
  const [done,setDone]=useState(false);
  const [caseId,setCaseId]=useState("");

  const submit=()=>{
    const id="C-"+String(cases.length+1).padStart(3,"0");
    setCases(p=>[{id,patientEmail:patient.email,name:form.name,dob:form.dob,email:form.email,phone:form.phone,injury:form.injury,date:form.date,notes:form.notes,files:files.map(f=>f.file.name),fileObjects:files.map(f=>f.file),status:"New",submitted:new Date().toISOString().slice(0,16).replace("T"," "),report:""},...p]);
    setCaseId(id);setDone(true);
  };

  if(done) return(
    <div style={{minHeight:"60vh",display:"flex",alignItems:"center",justifyContent:"center",padding:24}}>
      <div style={{background:"#fff",border:"0.5px solid #e0e4ea",borderRadius:16,padding:40,maxWidth:440,textAlign:"center"}}>
        <div style={{fontSize:52,marginBottom:16}}>✅</div>
        <h2 style={{color:N,fontSize:20,fontWeight:700,marginBottom:10}}>Case submitted!</h2>
        <div style={{display:"inline-block",background:"#eff6ff",color:B,fontSize:14,fontWeight:700,padding:"6px 18px",borderRadius:20,marginBottom:16}}>{caseId}</div>
        <p style={{color:"#6b7280",fontSize:14,lineHeight:1.7,marginBottom:24}}>Our team will review your case within <strong>48–72 hours</strong>.</p>
        <div style={{display:"flex",gap:10,justifyContent:"center",flexWrap:"wrap"}}>
          <button onClick={()=>setPage("pcases")} style={{background:N,color:"#fff",border:"none",padding:"10px 20px",borderRadius:8,fontSize:14,fontWeight:600}}>View my cases</button>
          <button onClick={()=>{setDone(false);setStep(1);setFiles([]);}} style={{background:"transparent",color:B,border:`0.5px solid ${B}`,padding:"10px 20px",borderRadius:8,fontSize:14,fontWeight:600}}>Submit another</button>
        </div>
      </div>
    </div>
  );

  const fld=(l,k,t="text",ph="")=>(
    <div key={k}>
      <label style={{fontSize:12,color:"#6b7280",display:"block",marginBottom:4}}>{l}</label>
      <input type={t} placeholder={ph} value={form[k]} onChange={e=>setForm(f=>({...f,[k]:e.target.value}))}

    <div style={{maxWidth:720,margin:"0 auto",padding:"32px 20px"}}>
      <h2 style={{color:N,fontSize:22,fontWeight:700,marginBottom:4}}>New consultation request</h2>
      <p style={{color:"#6b7280",fontSize:14,marginBottom:28}}>All data is end-to-end encrypted.</p>
      <div style={{display:"flex",marginBottom:32}}>
        {["Patient details","Upload files","Review & submit"].map((s,i)=>(
          <div key={s} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center"}}>
            <div style={{display:"flex",alignItems:"center",width:"100%"}}>
              {i>0&&<div style={{flex:1,height:2,background:step>i?B:"#e0e4ea"}}/>}
              <div style={{width:30,height:30,borderRadius:"50%",background:step>i?B:step===i+1?N:"#e0e4ea",color:step>i||step===i+1?"#fff":"#9ca3af",display:"flex",alignItems:"center",justifyContent:"center",fontSize:13,fontWeight:700,flexShrink:0}}>
                {step>i?"✓":i+1}
              </div>
              {i<2&&<div style={{flex:1,height:2,background:step>i+1?B:"#e0e4ea"}}/>}
            </div>
            <div style={{fontSize:11,color:step===i+1?N:"#9ca3af",marginTop:6,fontWeight:step===i+1?700:400,textAlign:"center"}}>{s}</div>
          </div>

      </div>

      {step===1&&(
        <div style={{background:"#fff",border:"0.5px solid #e0e4ea",borderRadius:12,padding:24}}>
          <div className="two-col" style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14,marginBottom:14}}>
            {fld("Full name","name","text")}
            {fld("Date of birth","dob","date")}
            {fld("Email address","email","email")}
            {fld("Phone number","phone","tel","+358 ...")}
          </div>
          <div className="two-col" style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14,marginBottom:14}}>
            <div>
              <label style={{fontSize:12,color:"#6b7280",display:"block",marginBottom:4}}>Injury type</label>
              <select value={form.injury} onChange={e=>setForm(f=>({...f,injury:e.target.value}))}
                style={{width:"100%",border:"0.5px solid #d1d5db",borderRadius:6,padding:"9px 12px",background:"#fafafa"}}>
                {INJURIES.map(t=><option key={t}>{t}</option>)}

            <textarea value={form.notes} onChange={e=>setForm(f=>({...f,notes:e.target.value}))}
              placeholder="Describe your symptoms, mechanism of injury, previous treatments..."
              style={{width:"100%",border:"0.5px solid #d1d5db",borderRadius:6,padding:"9px 12px",background:"#fafafa",height:90,resize:"none"}}/>
          </div>
          <button onClick={()=>setStep(2)} disabled={!form.name||!form.email}
            style={{background:form.name&&form.email?N:"#e0e4ea",color:form.name&&form.email?"#fff":"#9ca3af",border:"none",padding:"10px 28px",borderRadius:8,fontSize:14,fontWeight:600}}>
            Continue →
          </button>
        </div>
      )}

      {step===2&&(
        <div style={{background:"#fff",border:"0.5px solid #e0e4ea",borderRadius:12,padding:24}}>

          <UploadZone files={files} setFiles={setFiles}/>
          <div style={{display:"flex",justifyContent:"space-between",marginTop:20}}>
            <button onClick={()=>setStep(1)} style={{background:"transparent",color:"#6b7280",border:"0.5px solid #d1d5db",padding:"10px 20px",borderRadius:8,fontSize:14}}>← Back</button>
            <button onClick={()=>setStep(3)} style={{background:N,color:"#fff",border:"none",padding:"10px 24px",borderRadius:8,fontSize:14,fontWeight:600}}>Continue {files.length>0?`(${files.length} files)`:""} →</button>
          </div>
        </div>
      )}

      {step===3&&(
        <div>
          <div style={{background:"#fff",border:"0.5px solid #e0e4ea",borderRadius:12,padding:24,marginBottom:14}}>
            <div style={{fontSize:13,fontWeight:600,color:N,marginBottom:14}}>Review your submission</div>
            <div className="two-col" style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:12}}>
              {[["Name",form.name],["DOB",form.dob],["Email",form.email],["Phone",form.phone],["Injury",form.injury],["Date",form.date]].map(([k,v])=>(
                <div key={k} style={{background:"#f8fafc",borderRadius:8,padding:"10px 12px"}}>

                </div>
              ))}
            </div>
            {form.notes&&<div style={{background:"#f8fafc",borderRadius:8,padding:"10px 12px"}}>
              <div style={{fontSize:11,color:"#9ca3af",marginBottom:4}}>Notes</div>
              <div style={{fontSize:13,color:"#374151",lineHeight:1.6}}>{form.notes}</div>
            </div>}
          </div>
          <div style={{background:"#fff",border:"0.5px solid #e0e4ea",borderRadius:12,padding:24,marginBottom:14}}>
            <div style={{fontSize:13,fontWeight:600,color:N,marginBottom:10}}>Files ({files.length})</div>

              files.map((f,i)=>(
                <div key={i} style={{display:"flex",alignItems:"center",gap:10,padding:"7px 10px",background:"#f8fafc",borderRadius:6,marginBottom:6}}>
                  <span>{f.type==="dicom"?"🔬":f.type==="video"?"🎥":"🖼️"}</span>
                  <span style={{fontSize:13,color:"#374151",flex:1,wordBreak:"break-all"}}>{f.file.name}</span>
                  <span style={{fontSize:11,color:"#9ca3af"}}>{(f.file.size/1024).toFixed(0)} KB</span>
                </div>
              ))

          </div>
          <div style={{background:"#fffbeb",border:"0.5px solid #fcd34d",borderRadius:8,padding:"12px 16px",marginBottom:20,fontSize:13,color:"#92400e",lineHeight:1.6}}>

            <button onClick={submit} style={{background:B,color:"#fff",border:"none",padding:"10px 32px",borderRadius:8,fontSize:14,fontWeight:700}}>Submit case →</button>

        </div>
      )}
    </div>
  );
}

/* ── Admin file viewer ── */
function AdminFileViewer({files,fileNames}){
  const [preview,setPreview]=useState(null);
  const allNames=fileNames||[];
  const download=(f,name)=>{const url=URL.createObjectURL(f);const a=document.createElement("a");a.href=url;a.download=name||f.name;a.click();setTimeout(()=>URL.revokeObjectURL(url),1000);};
  const openPreview=f=>{if(!f)return;setPreview({url:URL.createObjectURL(f),type:f.type,name:f.name});};
  if(allNames.length===0) return(
    <div style={{background:"#fff",border:"0.5px solid #e0e4ea",borderRadius:8,padding:16,marginBottom:14}}>
      <div style={{fontSize:12,color:"#9ca3af",marginBottom:6}}>Files (0)</div>
      <div style={{color:"#9ca3af",fontSize:13}}>No files uploaded</div>
    </div>
  );
  return(
    <div style={{background:"#fff",border:"0.5px solid #e0e4ea",borderRadius:8,padding:16,marginBottom:14}}>
      {preview&&(
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.92)",zIndex:2000,display:"flex",flexDirection:"column"}}>
          <div style={{background:"#111827",padding:"10px 16px",display:"flex",alignItems:"center",justifyContent:"space-between",gap:8,flexWrap:"wrap"}}>
            <span style={{color:"#fff",fontSize:13,fontWeight:600}}>{preview.name}</span>
            <div style={{display:"flex",gap:8}}>
              <button onClick={()=>{const a=document.createElement("a");a.href=preview.url;a.download=preview.name;a.click();}} style={{background:B,color:"#fff",border:"none",padding:"6px 14px",borderRadius:6,fontSize:12,fontWeight:600}}>⬇ Download</button>
              <button onClick={()=>{URL.revokeObjectURL(preview.url);setPreview(null);}} style={{background:"#ef4444",color:"#fff",border:"none",padding:"6px 14px",borderRadius:6,fontSize:13,fontWeight:700}}>✕ Close</button>
            </div>
          </div>
          <div style={{flex:1,display:"flex",alignItems:"center",justifyContent:"center",padding:16,overflow:"auto"}}>
            {preview.type.startsWith("video/")?<video src={preview.url} controls autoPlay style={{maxWidth:"90%",maxHeight:"80vh",borderRadius:8}}/>:
             preview.type.startsWith("image/")?<img src={preview.url} alt="" style={{maxWidth:"90%",maxHeight:"80vh",borderRadius:8,objectFit:"contain"}}/>:
             <div style={{color:"#fff",textAlign:"center"}}><div style={{fontSize:60,marginBottom:16}}>🔬</div><div style={{fontSize:16,marginBottom:8}}>{preview.name}</div><button onClick={()=>{const a=document.createElement("a");a.href=preview.url;a.download=preview.name;a.click();}} style={{background:B,color:"#fff",border:"none",padding:"10px 24px",borderRadius:8,fontSize:14,fontWeight:600}}>⬇ Download DICOM file</button></div>}
          </div>
        </div>
      )}
      <div style={{fontSize:12,color:"#9ca3af",marginBottom:12}}>Files ({allNames.length})</div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(120px,1fr))",gap:8}}>
        {allNames.map((name,i)=>{
          const f=files[i]||null;
          const isDcm=name.toLowerCase().endsWith(".dcm");
          const isVid=!!name.match(/\.(mp4|mov|avi|webm)$/i);
          const isImg=!!name.match(/\.(jpg|jpeg|png|gif|webp)$/i);
          const icon=isDcm?"🔬":isVid?"🎥":"🖼️";
          const previewUrl=f&&isImg?URL.createObjectURL(f):null;
          return(
            <div key={i} style={{background:"#f8fafc",border:"0.5px solid #e0e4ea",borderRadius:8,overflow:"hidden",display:"flex",flexDirection:"column"}}>
              <div style={{height:70,background:isDcm?"#000":isVid?"#1f2937":"#e5e7eb",display:"flex",alignItems:"center",justifyContent:"center",overflow:"hidden"}}>
                {previewUrl?<img src={previewUrl} alt="" style={{width:"100%",height:"100%",objectFit:"cover"}}/>:<span style={{fontSize:26}}>{icon}</span>}
              </div>
              <div style={{padding:"6px 8px 4px",fontSize:10,color:"#374151",wordBreak:"break-all",lineHeight:1.3,flex:1}}>{name}</div>
              <div style={{display:"flex",gap:4,padding:"4px 6px 6px"}}>
                {f?<>
                  <button onClick={()=>openPreview(f)} style={{flex:1,background:N,color:"#fff",border:"none",padding:"4px",borderRadius:4,fontSize:10,fontWeight:600}}>👁 View</button>
                  <button onClick={()=>download(f,name)} style={{flex:1,background:B,color:"#fff",border:"none",padding:"4px",borderRadius:4,fontSize:10,fontWeight:600}}>⬇ Save</button>
                </>:<div style={{fontSize:10,color:"#9ca3af",textAlign:"center",width:"100%"}}>Not in session</div>}
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

  const saveReport=id=>{setCases(p=>p.map(c=>c.id===id?{...c,report,status:"Report sent"}:c));setSel(s=>({...s,report,status:"Report sent"}));};

        </div>
        <div style={{display:"flex",gap:4,flexWrap:"wrap",marginBottom:14}}>
          {["All","New","In review","Report sent"].map(f=>(
            <button key={f} onClick={()=>setFilter(f)} style={{background:filter===f?B:"rgba(255,255,255,0.08)",color:filter===f?"#fff":"rgba(255,255,255,0.65)",border:"none",padding:"4px 9px",borderRadius:20,fontSize:11,cursor:"pointer"}}>
              {f} ({counts(f)})
            </button>
          ))}
        </div>
        {filtered.map(c=>(
          <div key={c.id} style={{background:sel?.id===c.id?"rgba(26,110,181,0.35)":"rgba(255,255,255,0.07)",border:sel?.id===c.id?`1px solid ${B}`:"1px solid transparent",borderRadius:8,padding:"12px",marginBottom:8}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:6}}>
              <div onClick={()=>open(c)} style={{flex:1,cursor:"pointer"}}>
                <div style={{color:"#fff",fontSize:13,fontWeight:700}}>{c.name}</div>
                <div style={{color:"rgba(255,255,255,0.5)",fontSize:11,marginTop:2}}>{c.id} · {c.injury.split(" /")[0]}</div>
                <div style={{color:"rgba(255,255,255,0.4)",fontSize:10,marginTop:4}}>{c.files.length} files · {c.submitted}</div>
              </div>
              <div style={{display:"flex",flexDirection:"column",alignItems:"flex-end",gap:6}}>
                <Badge status={c.status}/>
                <button onClick={()=>deleteCase(c.id)} style={{background:"#ef4444",color:"#fff",border:"none",padding:"3px 8px",borderRadius:4,fontSize:10,fontWeight:700}}>🗑 Delete</button>
              </div>
            </div>
          </div>
        ))}
      </div>
      {sel?(
        <div style={{padding:24,overflowY:"auto",background:"#f7f8fa"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:20,flexWrap:"wrap",gap:12}}>
            <div>
              <h2 style={{fontSize:20,fontWeight:700,color:N}}>{sel.name}</h2>
              <div style={{fontSize:13,color:"#6b7280"}}>{sel.id} · {sel.submitted}</div>
            </div>
            <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
              {["New","In review","Report sent"].map(s=>(
                <button key={s} onClick={()=>setStatus(sel.id,s)} style={{background:sel.status===s?B:"#fff",color:sel.status===s?"#fff":"#374151",border:"0.5px solid #d1d5db",padding:"6px 10px",borderRadius:6,fontSize:12,fontWeight:sel.status===s?600:400}}>{s}</button>
              ))}
              <button onClick={()=>deleteCase(sel.id)} style={{background:"#ef4444",color:"#fff",border:"none",padding:"6px 12px",borderRadius:6,fontSize:12,fontWeight:700}}>🗑 Delete case</button>
            </div>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(150px,1fr))",gap:10,marginBottom:16}}>
            {[["Injury",sel.injury],["Date",sel.date],["DOB",sel.dob],["Email",sel.email],["Phone",sel.phone]].map(([k,v])=>(
              <div key={k} style={{background:"#fff",border:"0.5px solid #e0e4ea",borderRadius:8,padding:"10px 14px"}}>
                <div style={{fontSize:11,color:"#9ca3af",marginBottom:3}}>{k}</div>
                <div style={{fontSize:13,color:N,fontWeight:600,wordBreak:"break-all"}}>{v||"—"}</div>
              </div>
            ))}
          </div>
          {sel.notes&&<div style={{background:"#fff",border:"0.5px solid #e0e4ea",borderRadius:8,padding:16,marginBottom:14}}>
            <div style={{fontSize:12,color:"#9ca3af",marginBottom:6}}>Clinical notes</div>
            <p style={{fontSize:14,color:"#374151",lineHeight:1.7}}>{sel.notes}</p>
          </div>}
          <AdminFileViewer files={sel.fileObjects||[]} fileNames={sel.files}/>
          <div style={{background:"#fff",border:"0.5px solid #e0e4ea",borderRadius:8,padding:16}}>
            <div style={{fontSize:12,color:"#9ca3af",marginBottom:8}}>Consultation report</div>
            <textarea value={report} onChange={e=>setReport(e.target.value)} placeholder="Write your expert consultation report here..."
              style={{width:"100%",border:"0.5px solid #d1d5db",borderRadius:6,padding:"10px 12px",fontSize:14,height:150,resize:"vertical",fontFamily:"inherit"}}/>
            <button onClick={()=>saveReport(sel.id)} style={{marginTop:10,background:B,color:"#fff",border:"none",padding:"10px 20px",borderRadius:8,fontSize:14,fontWeight:700}}>Save & mark as Report sent</button>
          </div>
        </div>
      ):(
        <div style={{display:"flex",alignItems:"center",justifyContent:"center",color:"#9ca3af",fontSize:14,background:"#f7f8fa"}}>← Select a case to review</div>
      )}
    </div>
  );
}

      <div style={{display:"flex",gap:12,justifyContent:"center",flexWrap:"wrap",marginBottom:48}}>

      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(150px,1fr))",gap:16,maxWidth:560,margin:"0 auto"}}>

/* ── App ── */
function App(){
  const [page,setPage]=useState("home");
  const [adminIn,setAdminIn]=useState(false);
  const [loginErr,setLoginErr]=useState(false);
  const [cases,setCases]=useState(INIT_CASES);
  const [patients,setPatients]=useState(INIT_PATIENTS);
  const [patient,setPatient]=useState(null);

  const onAdmin=()=>adminIn?setPage("admin"):setPage("adminlogin");
  const onAdminLogin=(e,p)=>{if(e===ADMIN.email&&p===ADMIN.pw){setAdminIn(true);setPage("admin");setLoginErr(false);}else setLoginErr(true);};
  const onPatientLogin=p=>{setPatient(p);setPage("pcases");};
  const onPatientSignOut=()=>{setPatient(null);setPage("home");};

  const showFooter=!["admin","adminlogin"].includes(page);

  return(
    <div style={{minHeight:"100vh",display:"flex",flexDirection:"column"}}>
      <NavBar page={page} setPage={setPage} adminIn={adminIn} onAdmin={onAdmin} patient={patient} onSignOut={onPatientSignOut}/>
      <div style={{flex:1}}>
        {page==="home"&&<><Hero setPage={setPage}/><HowItWorks/><About/></>}
        {page==="pauth"&&<PatientAuth patients={patients} setPatients={setPatients} onLogin={onPatientLogin}/>}
        {page==="pcases"&&patient&&<PatientDashboard patient={patient} cases={cases} setPage={setPage}/>}
        {page==="psubmit"&&patient&&<PatientSubmit patient={patient} cases={cases} setCases={setCases} setPage={setPage}/>}
        {page==="pprofile"&&patient&&<PatientProfile patient={patient} setPatient={setPatient} patients={patients} setPatients={setPatients}/>}
        {page==="adminlogin"&&<AdminLogin onLogin={onAdminLogin} error={loginErr}/>}
        {page==="admin"&&adminIn&&<AdminPanel cases={cases} setCases={setCases} onLogout={()=>{setAdminIn(false);setPage("home");}}/>}
      </div>
      {showFooter&&<Footer setPage={setPage}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
